<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="instant ai logo favicon 32 (1).png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#001220" />
    <meta name="description" content="InstantResumeAI - Transform your resume with AI-powered enhancements" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    
    <title>InstantResumeAI - AI-Powered Resume Enhancement</title>
    
    <style>
      /* Initial loading styles */
      body {
        margin: 0;
        font-family: 'Kanit', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: #001220;
      }
      
      #root {
        min-height: 100vh;
      }
      
      .initial-loader {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(45deg, #001220 0%, #1a1a40 100%);
      }
      
      .loader-content {
        text-align: center;
        color: #90f1ef;
      }
      
      .loader-text {
        font-size: 1.5rem;
        margin-bottom: 1rem;
        animation: pulse 2s ease-in-out infinite;
      }
      
      .loader-spinner {
        width: 50px;
        height: 50px;
        margin: 0 auto;
        border: 3px solid rgba(144, 241, 239, 0.3);
        border-top: 3px solid #90f1ef;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <!-- Initial loading screen -->
      <div class="initial-loader">
        <div class="loader-content">
          <div class="loader-text">InstantResumeAI</div>
          <div class="loader-spinner"></div>
        </div>
      </div>
    </div>
  </body>
</html>
